<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>zcode — GLM 5.2 chat</title>
<style>
  :root {
    --bg: #0d1117;
    --bg-elev: #161b22;
    --bg-input: #0d1117;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --accent: #2f81f7;
    --accent-dim: #1f6feb;
    --user-bubble: #1c2128;
    --ai-bubble: #0d1117;
    --code-bg: #161b22;
    --mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { height: 100%; overflow: hidden; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* statusbar */
  .statusbar {
    background: var(--bg-elev);
    border-bottom: 1px solid var(--border);
    padding: 6px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
    flex-shrink: 0;
  }

  .statusbar .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #3fb950;
    box-shadow: 0 0 6px #3fb95066;
  }

  .statusbar .model-tag {
    background: var(--accent-dim);
    color: #fff;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
  }

  .statusbar .spacer { flex: 1; }

  .statusbar .brand {
    color: var(--accent);
    font-weight: 700;
    letter-spacing: 1px;
  }

  /* chat area */
  .chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 20px 0;
    scroll-behavior: smooth;
  }

  .message {
    max-width: 820px;
    margin: 0 auto 16px;
    padding: 0 20px;
    display: flex;
    gap: 12px;
  }

  .avatar {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    flex-shrink: 0;
  }

  .avatar.user {
    background: #1c2128;
    border: 1px solid #444c56;
    color: var(--text-dim);
  }

  .avatar.ai {
    background: var(--accent-dim);
    color: #fff;
  }

  .message-body {
    flex: 1;
    min-width: 0;
  }

  .message-role {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .message-content {
    line-height: 1.6;
    word-wrap: break-word;
    overflow-wrap: break-word;
  }

  .message-content p { margin-bottom: 10px; }
  .message-content p:last-child { margin-bottom: 0; }

  .message-content pre {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px;
    overflow-x: auto;
    margin: 10px 0;
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.5;
  }

  .message-content code {
    font-family: var(--mono);
    font-size: 13px;
  }

  .message-content :not(pre) > code {
    background: var(--code-bg);
    border: 1px solid var(--border);
    padding: 1px 5px;
    border-radius: 4px;
  }

  .message-content ul, .message-content ol {
    margin: 8px 0 8px 20px;
  }

  .message-content li { margin-bottom: 4px; }

  .message-content h1, .message-content h2, .message-content h3 {
    margin: 14px 0 8px;
    font-size: 15px;
    font-weight: 600;
  }

  /* typing indicator */
  .typing {
    display: inline-flex;
    gap: 4px;
    align-items: center;
    padding: 4px 0;
  }

  .typing span {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--text-dim);
    animation: typing-bounce 1.2s infinite ease-in-out;
  }

  .typing span:nth-child(2) { animation-delay: 0.15s; }
  .typing span:nth-child(3) { animation-delay: 0.3s; }

  @keyframes typing-bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  /* input area */
  .input-area {
    border-top: 1px solid var(--border);
    background: var(--bg-elev);
    padding: 12px 20px 16px;
    flex-shrink: 0;
  }

  .input-wrapper {
    max-width: 820px;
    margin: 0 auto;
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }

  .input-box {
    flex: 1;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    resize: none;
    max-height: 160px;
    min-height: 42px;
    line-height: 1.5;
    transition: border-color 0.15s;
    outline: none;
  }

  .input-box:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(47, 129, 247, 0.15);
  }

  .input-box::placeholder { color: var(--text-dim); }

  .send-btn {
    background: var(--accent-dim);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 0 18px;
    height: 42px;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
  }

  .send-btn:hover { background: var(--accent); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .input-hint {
    max-width: 820px;
    margin: 6px auto 0;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    text-align: center;
  }

  /* welcome */
  .welcome {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
  }

  .welcome h1 {
    font-size: 24px;
    color: var(--text);
    margin-bottom: 8px;
    font-weight: 600;
  }

  .welcome p {
    font-family: var(--mono);
    font-size: 13px;
    margin-bottom: 24px;
  }

  .welcome .suggestions {
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-width: 400px;
    margin: 0 auto;
  }

  .welcome .suggestion {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    text-align: left;
    cursor: pointer;
    color: var(--text-dim);
    font-size: 13px;
    transition: border-color 0.15s, color 0.15s;
  }

  .welcome .suggestion:hover {
    border-color: var(--accent);
    color: var(--text);
  }

  .welcome .suggestion .label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    margin-bottom: 3px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* scrollbar */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #484f58; }
</style>
</head>
<body>

<div class="statusbar">
  <div class="dot"></div>
  <span>connected</span>
  <span class="model-tag">z-ai/glm-5.2</span>
  <div class="spacer"></div>
  <span class="brand">zcode</span>
</div>

<div class="chat-container" id="chat">
  <div class="welcome" id="welcome">
    <h1>zcode</h1>
    <p>GLM 5.2 // puter.js runtime</p>
    <div class="suggestions">
      <div class="suggestion" data-prompt="Write a Python function that finds duplicate files by hash in a directory tree">
        <div class="label">code</div>
        Find duplicate files by content hash
      </div>
      <div class="suggestion" data-prompt="Explain how async event loop works in JavaScript with examples">
        <div class="label">explain</div>
        JS async event loop walkthrough
      </div>
      <div class="suggestion" data-prompt="Write a SQL query to find the top 5 customers by total spend, including their last order date">
        <div class="label">sql</div>
        Top 5 customers by total spend
      </div>
      <div class="suggestion" data-prompt="Review this code for bugs and security issues: const query = `SELECT * FROM users WHERE id = ${req.body.id}`">
        <div class="label">review</div>
        SQL injection code review
      </div>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-wrapper">
    <textarea
      class="input-box"
      id="input"
      placeholder="Ask GLM 5.2 anything..."
      rows="1"
      autofocus
    ></textarea>
    <button class="send-btn" id="send">Send ↵</button>
  </div>
  <div class="input-hint">Enter to send · Shift+Enter for newline</div>
</div>

<script src="https://js.puter.com/v2/"></script>
<script>
const chatEl = document.getElementById('chat');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send');
const welcomeEl = document.getElementById('welcome');

let conversationHistory = [];
let isGenerating = false;

// auto-resize textarea
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
});

// enter to send
inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

sendBtn.addEventListener('click', sendMessage);

// suggestion clicks
document.querySelectorAll('.suggestion').forEach(s => {
  s.addEventListener('click', () => {
    inputEl.value = s.dataset.prompt;
    sendMessage();
  });
});

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// basic markdown rendering — code blocks, inline code, bold, headers, lists, paragraphs
function renderMarkdown(text) {
  let html = '';
  const lines = text.split('\n');
  let inCodeBlock = false;
  let codeLang = '';
  let codeBuffer = [];
  let inList = false;
  let listType = '';

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];

    // code fence
    if (line.trim().startsWith('```')) {
      if (inCodeBlock) {
        html += `<pre><code>${escapeHtml(codeBuffer.join('\n'))}</code></pre>`;
        codeBuffer = [];
        inCodeBlock = false;
        codeLang = '';
      } else {
        inCodeBlock = true;
        codeLang = line.trim().slice(3);
      }
      continue;
    }

    if (inCodeBlock) {
      codeBuffer.push(line);
      continue;
    }

    // close list if line is not a list item
    if (inList && !line.match(/^\s*[-*]\s/) && !line.match(/^\s*\d+\.\s/)) {
      html += `</${listType}>`;
      inList = false;
    }

    // unordered list
    if (line.match(/^\s*[-*]\s/)) {
      if (!inList || listType !== 'ul') {
        if (inList) html += `</${listType}>`;
        html += '<ul>';
        inList = true;
        listType = 'ul';
      }
      html += `<li>${inlineMd(line.replace(/^\s*[-*]\s/, ''))}</li>`;
      continue;
    }

    // ordered list
    if (line.match(/^\s*\d+\.\s/)) {
      if (!inList || listType !== 'ol') {
        if (inList) html += `</${listType}>`;
        html += '<ol>';
        inList = true;
        listType = 'ol';
      }
      html += `<li>${inlineMd(line.replace(/^\s*\d+\.\s/, ''))}</li>`;
      continue;
    }

    // headers
    if (line.startsWith('### ')) {
      html += `<h3>${inlineMd(line.slice(4))}</h3>`;
      continue;
    }
    if (line.startsWith('## ')) {
      html += `<h2>${inlineMd(line.slice(3))}</h2>`;
      continue;
    }
    if (line.startsWith('# ')) {
      html += `<h1>${inlineMd(line.slice(2))}</h1>`;
      continue;
    }

    // blank line
    if (line.trim() === '') {
      html += '';
      continue;
    }

    // normal paragraph
    html += `<p>${inlineMd(line)}</p>`;
  }

  // close any open blocks
  if (inCodeBlock) {
    html += `<pre><code>${escapeHtml(codeBuffer.join('\n'))}</code></pre>`;
  }
  if (inList) html += `</${listType}>`;

  return html;
}

function inlineMd(text) {
  // inline code
  text = text.replace(/`([^`]+)`/g, (m, code) => `<code>${escapeHtml(code)}</code>`);
  // bold
  text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  // italic (avoid matching bold)
  text = text.replace(/(?<!\*)\*([^*]+)\*(?!\*)/g, '<em>$1</em>');
  // links
  text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" style="color:var(--accent)">$1</a>');
  return text;
}

function addMessage(role, content) {
  // hide welcome on first message
  if (welcomeEl) {
    welcomeEl.remove();
  }

  const msg = document.createElement('div');
  msg.className = 'message';

  const avatar = document.createElement('div');
  avatar.className = `avatar ${role}`;
  avatar.textContent = role === 'user' ? 'U' : 'Z';

  const body = document.createElement('div');
  body.className = 'message-body';

  const roleLabel = document.createElement('div');
  roleLabel.className = 'message-role';
  roleLabel.textContent = role === 'user' ? 'user' : 'glm-5.2';

  const contentEl = document.createElement('div');
  contentEl.className = 'message-content';

  if (role === 'user') {
    contentEl.innerHTML = escapeHtml(content).replace(/\n/g, '<br>');
  } else {
    contentEl.innerHTML = renderMarkdown(content);
  }

  body.appendChild(roleLabel);
  body.appendChild(contentEl);
  msg.appendChild(avatar);
  msg.appendChild(body);
  chatEl.appendChild(msg);
  chatEl.scrollTop = chatEl.scrollHeight;

  return contentEl;
}

function addTypingIndicator() {
  if (welcomeEl) welcomeEl.remove();

  const msg = document.createElement('div');
  msg.className = 'message';
  msg.id = 'typing-msg';

  const avatar = document.createElement('div');
  avatar.className = 'avatar ai';
  avatar.textContent = 'Z';

  const body = document.createElement('div');
  body.className = 'message-body';

  const roleLabel = document.createElement('div');
  roleLabel.className = 'message-role';
  roleLabel.textContent = 'glm-5.2';

  const typing = document.createElement('div');
  typing.className = 'typing';
  typing.innerHTML = '<span></span><span></span><span></span>';

  body.appendChild(roleLabel);
  body.appendChild(typing);
  msg.appendChild(avatar);
  msg.appendChild(body);
  chatEl.appendChild(msg);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function removeTypingIndicator() {
  const t = document.getElementById('typing-msg');
  if (t) t.remove();
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || isGenerating) return;

  isGenerating = true;
  sendBtn.disabled = true;
  inputEl.value = '';
  inputEl.style.height = 'auto';

  // add user message
  addMessage('user', text);

  // track conversation
  conversationHistory.push({ role: 'user', content: text });

  // typing indicator
  addTypingIndicator();

  try {
    // build messages array — give system context for zcode behavior
    const messages = [
      {
        role: 'system',
        content: 'You are zcode, a coding assistant powered by GLM 5.2. You provide precise, practical answers with code examples. Be concise. Use markdown for code blocks. When reviewing code, identify issues directly without hedging.'
      },
      ...conversationHistory
    ];

    const response = await puter.ai.chat(messages, { model: 'z-ai/glm-5.2' });

    // puter returns the message in response.message.content or response directly depending on format
    let responseText = '';
    if (typeof response === 'string') {
      responseText = response;
    } else if (response?.message?.content) {
      responseText = response.message.content;
    } else if (response?.text) {
      responseText = response.text;
    } else {
      responseText = JSON.stringify(response);
    }

    // extract text from content array if needed
    if (Array.isArray(responseText)) {
      responseText = responseText.map(c => c.text || '').join('');
    }

    removeTypingIndicator();
    addMessage('ai', responseText);

    // track conversation
    conversationHistory.push({ role: 'assistant', content: responseText });

  } catch (err) {
    removeTypingIndicator();
    const errMsg = err?.message || err?.error?.message || 'Request failed. Check console.';
    addMessage('ai', `**Error:** ${errMsg}\n\nMake sure you're signed into Puter and the model \`z-ai/glm-5.2\` is available.`);
    console.error('puter.ai.chat error:', err);
  }

  isGenerating = false;
  sendBtn.disabled = false;
  inputEl.focus();
}
</script>
</body>
</html>
